<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shorts Ranker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #1e1e2e;
    --accent: #7c3aed; --accent2: #a855f7; --text: #e2e8f0;
    --muted: #64748b; --green: #22c55e; --red: #ef4444;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  header { padding: 20px 32px; border-bottom: 1px solid var(--border); display: flex; align-items: center; }
  .logo { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; background: linear-gradient(135deg, #7c3aed, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .tagline { color: var(--muted); font-size: 13px; margin-left: auto; }
  main { flex: 1; display: grid; grid-template-columns: 1fr 340px; gap: 28px; max-width: 1100px; margin: 0 auto; width: 100%; padding: 28px; }
  .left-panel, .right-panel { display: flex; flex-direction: column; gap: 20px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }
  .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 36px 20px; text-align: center; transition: border-color 0.2s, background 0.2s; }
  .drop-zone.drag-over { border-color: var(--accent2); background: rgba(124,58,237,0.05); }
  .drop-icon { font-size: 32px; margin-bottom: 10px; }
  .drop-label { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
  .drop-sub { font-size: 13px; color: var(--muted); }
  .btn-browse { display: inline-block; margin-top: 12px; padding: 8px 20px; background: var(--accent); color: #fff; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .video-list { display: flex; flex-direction: column; gap: 8px; }
  .video-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
  .video-rank { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: var(--accent2); width: 32px; text-align: center; flex-shrink: 0; }
  .video-thumb { width: 44px; height: 44px; border-radius: 6px; object-fit: cover; background: var(--border); flex-shrink: 0; }
  .video-info { flex: 1; min-width: 0; }
  .video-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .video-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 4px; border-radius: 4px; transition: color 0.15s; }
  .remove-btn:hover { color: var(--red); }
  label.field-label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 8px; }
  input[type="text"] { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
  input[type="text"]:focus { border-color: var(--accent2); }
  .ranking-preview { display: flex; flex-direction: column; gap: 6px; }
  .rank-row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; background: var(--bg); border-radius: 6px; border: 1px solid var(--border); cursor: grab; user-select: none; transition: background 0.15s, border-color 0.15s; }
  .rank-row:active { cursor: grabbing; }
  .rank-row.dragging { opacity: 0.4; border-color: var(--accent2); }
  .rank-row.drag-over-top { border-top: 2px solid var(--accent2); }
  .rank-row.drag-over-bottom { border-bottom: 2px solid var(--accent2); }
  .drag-handle { color: var(--muted); font-size: 14px; flex-shrink: 0; }
  .rank-num { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: var(--accent2); width: 24px; flex-shrink: 0; }
  .rank-name { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; font-family: 'Space Grotesk', sans-serif; cursor: pointer; border: none; transition: all 0.2s; width: 100%; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-secondary { background: var(--bg); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }
  .btn-success { background: var(--green); color: #fff; }
  .progress-section { display: none; }
  .progress-section.active { display: block; }
  .progress-bar-track { background: var(--border); border-radius: 999px; height: 6px; overflow: hidden; margin-top: 10px; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 999px; transition: width 0.15s ease; width: 0%; }
  .progress-label { font-size: 12px; color: var(--muted); margin-top: 6px; font-family: 'Space Mono', monospace; }
  .log-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); max-height: 100px; overflow-y: auto; margin-top: 10px; }
  .log-line { margin-bottom: 3px; }
  .log-line.ok { color: var(--green); }
  .log-line.err { color: var(--red); }
  .empty-state { text-align: center; padding: 20px; color: var(--muted); font-size: 13px; }
  .overlay-preview { background: #111; border-radius: 8px; border: 1px solid var(--border); padding: 10px; display: flex; gap: 10px; min-height: 110px; margin-top: 4px; }
  .overlay-sidebar { background: rgba(0,0,0,0.8); border-radius: 6px; padding: 8px; width: 110px; flex-shrink: 0; }
  .overlay-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent2); margin-bottom: 6px; font-family: 'Space Mono', monospace; }
  .overlay-item { font-size: 9px; color: rgba(255,255,255,0.85); padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.08); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Space Mono', monospace; }
  .overlay-video-area { flex: 1; background: #1a1a1a; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; background: rgba(124,58,237,0.15); color: var(--accent2); border: 1px solid rgba(124,58,237,0.3); margin-left: 8px; }
  .speed-row { display: flex; gap: 8px; margin-top: 12px; }
  .speed-btn { flex: 1; padding: 7px; border-radius: 6px; font-size: 12px; font-weight: 600; font-family: 'Space Grotesk', sans-serif; cursor: pointer; border: 1px solid var(--border); background: var(--bg); color: var(--muted); transition: all 0.15s; }
  .speed-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  canvas { display: none; }
</style>
</head>
<body>
<header>
  <div class="logo">SHORTS//RANK</div>
  <div class="tagline">Upload · Rank · Combine</div>
</header>
<main>
  <div class="left-panel">
    <div class="card">
      <div class="card-title">1. Upload Shorts</div>
      <div class="drop-zone" id="dropZone">
        <div class="drop-icon">🎬</div>
        <div class="drop-label">Drop your video files here</div>
        <div class="drop-sub">MP4, MOV, WebM supported</div>
        <label for="fileInput" class="btn-browse">Browse Files</label>
        <input type="file" id="fileInput" multiple accept="video/*" style="display:none">
      </div>
    </div>
    <div class="card" id="videoListCard" style="display:none">
      <div class="card-title">Uploaded Videos <span class="badge" id="videoCount">0</span></div>
      <div class="video-list" id="videoList"></div>
    </div>
    <div class="card progress-section" id="progressSection">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title" style="margin-bottom:0">Processing</div>
        <div id="etaLabel" style="font-family:monospace;font-size:12px;color:var(--accent2)"></div>
      </div>
      <div id="clipLabel" style="font-size:13px;color:var(--text);margin-bottom:8px">Starting...</div>
      <div class="progress-bar-track"><div class="progress-bar-fill" id="progressFill"></div></div>
      <div id="progressLabel" class="progress-label">0% complete</div>
    </div>
  </div>
  <div class="right-panel">
    <div class="card">
      <div class="card-title">2. Ranking Title</div>
      <label class="field-label">What are you ranking?</label>
      <input type="text" id="rankTitle" placeholder="e.g. Top Shorts" value="Top Shorts">
    </div>
    <div class="card">
      <div class="card-title">3. Ranking <span style="color:var(--muted);font-size:11px;font-weight:400;text-transform:none;letter-spacing:0">— drag to reorder</span></div>
      <div id="rankingPreview" class="ranking-preview">
        <div class="empty-state">Upload videos first, then rank.</div>
      </div>
      <br>
      <button class="btn btn-secondary" onclick="shuffleRanking()">🔀 Shuffle Ranking</button>
    </div>

    <div class="card">
      <div class="card-title">Overlay Preview</div>
      <div class="overlay-preview">
        <div class="overlay-sidebar">
          <div class="overlay-title" id="previewTitle">TOP SHORTS</div>
          <div id="previewList"><div style="color:#444;font-size:9px;font-family:monospace">no videos yet</div></div>
        </div>
        <div class="overlay-video-area">▶ video plays here</div>
      </div>
    </div>
    <button class="btn btn-primary" id="generateBtn" onclick="generateVideo()" disabled>⚡ Combine &amp; Download</button>
  </div>
</main>
<canvas id="canvas"></canvas>
<script>
let videos = [];
let ranked = [];
let speed = 2; // playback rate multiplier
const FPS = 30;
const FRAME_MS = 1000 / FPS;

function setSpeed(s) {
  speed = s;
  [1,2,4].forEach(v => {
    const el = document.getElementById('spd-'+v+'x');
    if (el) el.classList.toggle('active', v === s);
  });
}

// ─── File handling ────────────────────────────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); handleFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => handleFiles([...fileInput.files]));

function handleFiles(files) {
  files.filter(f => f.type.startsWith('video/')).forEach(file => {
    const url = URL.createObjectURL(file);
    const v = document.createElement('video');
    v.src = url; v.preload = 'metadata';
    v.onloadedmetadata = () => {
      videos.push({ file, name: file.name.replace(/\.[^.]+$/, ''), url, duration: v.duration });
      renderVideoList(); shuffleRanking(); updateGenerateBtn();
    };
  });
}

function removeVideo(index) {
  URL.revokeObjectURL(videos[index].url);
  videos.splice(index, 1);
  renderVideoList(); shuffleRanking(); updateGenerateBtn();
}

function renderVideoList() {
  const card = document.getElementById('videoListCard');
  const list = document.getElementById('videoList');
  document.getElementById('videoCount').textContent = videos.length;
  if (!videos.length) { card.style.display = 'none'; return; }
  card.style.display = 'block';
  list.innerHTML = '';
  ranked.forEach((vi, ri) => {
    const v = videos[vi];
    const d = document.createElement('div');
    d.className = 'video-item';
    d.innerHTML = `<div class="video-rank">${ri+1}</div><video class="video-thumb" src="${v.url}" preload="metadata"></video><div class="video-info"><div class="video-name">${v.name}</div><div class="video-meta">${fmt(v.duration)}</div></div><button class="remove-btn" onclick="removeVideo(${vi})">✕</button>`;
    list.appendChild(d);
  });
}

function fmt(s) { if (!s||isNaN(s)) return '--'; return `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`; }

function shuffleRanking() {
  if (!videos.length) { document.getElementById('rankingPreview').innerHTML = '<div class="empty-state">Upload videos first, then rank.</div>'; updateOverlayPreview(); return; }
  ranked = videos.map((_,i)=>i);
  for (let i = ranked.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [ranked[i],ranked[j]]=[ranked[j],ranked[i]]; }
  renderRankingList();
}

let dragSrcIdx = null;

function renderRankingList() {
  const p = document.getElementById('rankingPreview');
  p.innerHTML = '';
  ranked.forEach((vi, ri) => {
    const r = document.createElement('div');
    r.className = 'rank-row';
    r.draggable = true;
    r.dataset.ri = ri;
    r.innerHTML = `<span class="drag-handle">⠿</span><span class="rank-num">#${ri+1}</span><span class="rank-name">${videos[vi].name}</span>`;

    r.addEventListener('dragstart', () => { dragSrcIdx = ri; setTimeout(() => r.classList.add('dragging'), 0); });
    r.addEventListener('dragend', () => { r.classList.remove('dragging'); document.querySelectorAll('.rank-row').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom')); });
    r.addEventListener('dragover', e => {
      e.preventDefault();
      document.querySelectorAll('.rank-row').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));
      const rect = r.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      r.classList.add(e.clientY < mid ? 'drag-over-top' : 'drag-over-bottom');
    });
    r.addEventListener('drop', e => {
      e.preventDefault();
      if (dragSrcIdx === null || dragSrcIdx === ri) return;
      const rect = r.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      const insertAfter = e.clientY >= mid;
      const moved = ranked.splice(dragSrcIdx, 1)[0];
      let target = ri;
      if (dragSrcIdx < ri) target = insertAfter ? ri : ri - 1;
      else target = insertAfter ? ri + 1 : ri;
      ranked.splice(Math.max(0, target), 0, moved);
      dragSrcIdx = null;
      renderRankingList();
      renderVideoList();
      updateOverlayPreview();
    });

    p.appendChild(r);
  });
  renderVideoList();
  updateOverlayPreview();
}

document.getElementById('rankTitle').addEventListener('input', updateOverlayPreview);

function updateOverlayPreview() {
  const title = document.getElementById('rankTitle').value || 'Top Shorts';
  document.getElementById('previewTitle').textContent = title.toUpperCase();
  const list = document.getElementById('previewList');
  if (!ranked.length) { list.innerHTML = '<div style="color:#444;font-size:9px;font-family:monospace">no videos yet</div>'; return; }
  list.innerHTML = ranked.slice(0,8).map((vi,ri) => `<div class="overlay-item">${ri+1}. ${videos[vi].name}</div>`).join('');
}

function updateGenerateBtn() { document.getElementById('generateBtn').disabled = videos.length < 2; }

// ─── Draw overlay onto canvas context ────────────────────────────────────────
function drawOverlay(ctx, W, H, title, clipIndex) {
  const padX = 28;
  const lineH = 54;
  const startY = 60;

  // Title
  ctx.font = 'bold 44px Arial Black, Arial';
  ctx.textBaseline = 'top';
  const titleLines = wrapText(ctx, title, W - padX * 2);
  let titleY = startY;
  titleLines.forEach(line => {
    const tw = ctx.measureText(line).width;
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(padX - 6, titleY - 4, tw + 12, 50);
    ctx.fillStyle = '#ffffff';
    ctx.fillText(line, padX, titleY);
    titleY += 52;
  });

  // Ranked items
  const itemStartY = titleY + 18;
  ranked.forEach((vi, ri) => {
    const isActive = ri === clipIndex;
    const y = itemStartY + ri * lineH;
    const name = videos[vi].name.substring(0, 22);
    const label = `${ri + 1}.  ${name}`;

    ctx.font = isActive ? 'bold 36px Arial Black, Arial' : 'bold 30px Arial, sans-serif';
    const tw = ctx.measureText(label).width;

    // Shadow box behind text
    ctx.fillStyle = 'rgba(0,0,0,0.42)';
    ctx.fillRect(padX - 6, y - 2, tw + 16, isActive ? 44 : 38);

    // Number in accent color, name in white
    const numStr = `${ri + 1}.  `;
    const numW = ctx.measureText(numStr).width;

    ctx.fillStyle = isActive ? '#f0c93a' : '#a855f7';
    ctx.fillText(numStr, padX, y);

    ctx.fillStyle = '#ffffff';
    ctx.fillText(name, padX + numW, y);
  });
}

function wrapText(ctx, text, maxWidth) {
  const words = text.split(' ');
  const lines = [];
  let current = '';
  for (const word of words) {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

function drawVideoFrame(ctx, vid, W, H) {
  const vr = vid.videoWidth / vid.videoHeight;
  const cr = W / H;
  let sw, sh, sx, sy;
  if (vr > cr) { sh = H; sw = H * vr; sx = -(sw-W)/2; sy = 0; }
  else { sw = W; sh = W / vr; sx = 0; sy = -(sh-H)/2; }
  ctx.drawImage(vid, sx, sy, sw, sh);
}

// ─── FAST mode: seek frame by frame ──────────────────────────────────────────
function seekRenderClip(ctx, videoObj, W, H, title, clipIndex, recorder) {
  return new Promise((resolve, reject) => {
    const vid = document.createElement('video');
    vid.src = videoObj.url;
    vid.preload = 'auto';
    vid.muted = true;

    vid.onloadedmetadata = async () => {
      const duration = vid.duration;
      const totalFrames = Math.floor(duration * FPS);
      addLog(`  ${videoObj.name}: ${totalFrames} frames`);

      for (let f = 0; f < totalFrames; f++) {
        const t = f / FPS;
        await seekTo(vid, t);
        drawVideoFrame(ctx, vid, W, H);
        drawOverlay(ctx, W, H, title, clipIndex);
        // Give recorder a tick to capture the frame
        await new Promise(r => setTimeout(r, 0));
      }
      resolve();
    };
    vid.onerror = reject;
    vid.load();
  });
}

function seekTo(vid, time) {
  return new Promise(res => {
    vid.currentTime = time;
    vid.onseeked = () => res();
  });
}

// ─── Real-time playback capturing both canvas video + original audio ─────────
function realtimeRenderClip(ctx, videoObj, W, H, title, clipIndex, audioCtx, audioDest) {
  return new Promise((resolve, reject) => {
    const vid = document.createElement('video');
    vid.src = videoObj.url;
    vid.preload = 'auto';
    vid.muted = false;
    vid.crossOrigin = 'anonymous';

    vid.oncanplaythrough = () => {
      // Wire audio: video -> gain node -> combined destination
      try {
        const source = audioCtx.createMediaElementSource(vid);
        const gain = audioCtx.createGain();
        gain.gain.value = 1;
        source.connect(gain);
        gain.connect(audioDest);
      } catch(e) {
        // audio wiring failed silently, video still renders
      }

      vid.play();

      function frame() {
        if (vid.ended) { resolve(); return; }
        drawVideoFrame(ctx, vid, W, H);
        drawOverlay(ctx, W, H, title, clipIndex);
        requestAnimationFrame(frame);
      }
      requestAnimationFrame(frame);
      vid.addEventListener('ended', resolve, { once: true });
    };
    vid.onerror = reject;
    vid.load();
  });
}

// ─── Main generate ────────────────────────────────────────────────────────────
async function generateVideo() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true; btn.textContent = '⏳ Processing...';
  document.getElementById('progressSection').classList.add('active');
  setProgress(0);

  const title = document.getElementById('rankTitle').value || 'Top Shorts';
  const W = 720, H = 1280;
  const canvas = document.getElementById('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Set up Web Audio context to capture original audio
  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const audioDest = audioCtx.createMediaStreamDestination();

  // Combine canvas video stream + audio stream
  const videoStream = canvas.captureStream(FPS);
  const audioStream = audioDest.stream;
  const combinedStream = new MediaStream([
    ...videoStream.getVideoTracks(),
    ...audioStream.getAudioTracks()
  ]);

  const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';
  // Calculate total duration for ETA
  const totalSecs = ranked.reduce((sum, vi) => sum + (videos[vi].duration || 0), 0);
  startProgress(totalSecs);

  const chunks = [];
  const recorder = new MediaRecorder(combinedStream, { mimeType, videoBitsPerSecond: 5_000_000 });
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  const done = new Promise(res => recorder.onstop = res);
  recorder.start(50);

  for (let i = 0; i < ranked.length; i++) {
    const v = videos[ranked[i]];
    setClipLabel(`Clip ${i+1} of ${ranked.length}: ${v.name}`);
    await realtimeRenderClip(ctx, v, W, H, title, i, audioCtx, audioDest);
    tickProgress(v.duration || 0);
  }

  setClipLabel('Finalizing...');
  document.getElementById('etaLabel').textContent = '';
  recorder.stop();
  await done;
  audioCtx.close();
  setProgress(100);

  const blob = new Blob(chunks, { type: mimeType });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `${title.replace(/\s+/g,'_')}_ranked.webm`;
  a.click();

  setClipLabel('Done! Downloading...');
  btn.textContent = '✅ Download Started!';
  btn.className = 'btn btn-success';
  setTimeout(() => { btn.textContent = '⚡ Combine & Download'; btn.className = 'btn btn-primary'; btn.disabled = false; }, 3000);
}

let _startTime = null;
let _totalDuration = 0;
let _processedDuration = 0;

function startProgress(totalSecs) {
  _startTime = Date.now();
  _totalDuration = totalSecs;
  _processedDuration = 0;
  setProgress(0);
}

function tickProgress(clipSecs) {
  _processedDuration += clipSecs;
  const pct = Math.min((_processedDuration / _totalDuration) * 100, 99);
  const elapsed = (Date.now() - _startTime) / 1000;
  const rate = _processedDuration / elapsed;
  const remaining = (_totalDuration - _processedDuration) / rate;
  setProgress(pct, remaining);
}

function setProgress(pct, remainingSecs) {
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = Math.round(pct) + '% complete';
  if (remainingSecs !== undefined && remainingSecs > 0) {
    const m = Math.floor(remainingSecs / 60);
    const s = Math.floor(remainingSecs % 60);
    document.getElementById('etaLabel').textContent = m > 0 ? `~${m}m ${s}s left` : `~${s}s left`;
  }
}

function setClipLabel(msg) {
  document.getElementById('clipLabel').textContent = msg;
}

function addLog(msg, type='') {
  // silent — no log box anymore
}
</script>
